<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Toutes nos recettes faciles et savoureuses — Recettes Maison.">
<title>Toutes les recettes — Recettes Maison</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#faf6f0;--warm:#f2ebe0;--ink:#1c1812;--terracotta:#c4622d;--sage:#7a8c6e;--rule:#e0d8cc;--mid:#9a8f82;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--cream);color:var(--ink);font-family:'Jost',sans-serif;font-weight:300;}
.masthead{border-bottom:2px solid var(--ink);text-align:center;padding:20px 24px;}
.site-name{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:700;text-decoration:none;color:var(--ink);}
.site-name em{color:var(--terracotta);font-style:italic;}
nav{display:flex;justify-content:center;border-top:1px solid var(--rule);border-bottom:1px solid var(--rule);margin-top:12px;flex-wrap:wrap;}
nav a{padding:10px 20px;font-size:11px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--ink);text-decoration:none;border-right:1px solid var(--rule);transition:all 0.2s;}
nav a:first-child{border-left:1px solid var(--rule);}
nav a:hover{background:var(--ink);color:var(--cream);}
.container{max-width:1100px;margin:0 auto;padding:40px 24px;}
.page-title{font-family:'Cormorant Garamond',serif;font-size:48px;font-weight:700;font-style:italic;margin-bottom:8px;}
.page-sub{font-size:13px;color:var(--mid);letter-spacing:2px;text-transform:uppercase;margin-bottom:40px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);}
.card{background:var(--cream);padding:24px 20px;transition:background 0.2s;}
.card:hover{background:var(--warm);}
.card-cat{font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;color:var(--terracotta);margin-bottom:8px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;line-height:1.2;margin-bottom:8px;}
.card-title a{text-decoration:none;color:var(--ink);}
.card-title a:hover{color:var(--terracotta);}
.card-meta{font-size:11px;color:var(--mid);display:flex;gap:12px;}
.loading{text-align:center;padding:60px;font-size:14px;color:var(--mid);letter-spacing:2px;text-transform:uppercase;grid-column:1/-1;}
footer{background:var(--ink);color:#888;padding:32px;text-align:center;font-size:12px;margin-top:48px;}
footer a{color:#888;text-decoration:none;}
@media(max-width:768px){.grid{grid-template-columns:1fr;}.site-name{font-size:36px;}}
</style>
</head>
<body>
<header class="masthead">
  <a href="https://fffabio0803.github.io/Recette-bot-1" class="site-name">Recettes <em>Maison</em></a>
  <nav>
    <a href="https://fffabio0803.github.io/Recette-bot-1">Accueil</a>
    <a href="#">Rapides</a>
    <a href="#">Desserts</a>
    <a href="#">Salades</a>
    <a href="#">Soupes</a>
  </nav>
</header>
<div class="container">
  <h1 class="page-title">Toutes les recettes</h1>
  <p class="page-sub">Mise à jour chaque jour · <span id="total"></span></p>
  <div class="grid" id="grid">
    <div class="loading">Chargement...</div>
  </div>
</div>
<footer>
  <div style="font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:#fff;margin-bottom:8px;">Recettes <em style="color:#c4622d">Maison</em></div>
  <p>© 2025 Recettes Maison · <a href="#">Mentions légales</a></p>
</footer>
<script>
fetch('recettes.json')
  .then(r=>r.json())
  .then(data=>{
    const r=data.recettes||[];
    document.getElementById('total').textContent=r.length+' recettes';
    document.getElementById('grid').innerHTML=r.map(x=>`
      <div class="card">
        <div class="card-cat">${x.emoji} ${x.category}</div>
        <div class="card-title"><a href="${x.url}">${x.title}</a></div>
        <div class="card-meta"><span>⏱ ${x.prep_time}</span><span>🔥 ${x.cook_time}</span><span>👥 ${x.servings} pers.</span></div>
      </div>`).join('');
  });
</script>
</body>
</html>
