name: 🍳 Recette du Jour

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-recipe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dépendances
        run: pip install anthropic

      - name: Génération recette
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python scripts/generate_recipe.py

      - name: Publication
        run: |
          git config user.email "bot@recettes-maison.fr"
          git config user.name "Bot"
          git add -A
          git diff --staged --quiet || git commit -m "Nouvelle recette"
          git push
